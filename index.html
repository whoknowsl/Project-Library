<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Library</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
 
    <!-- HEADER -->
    <header class="header">
      <div class="header-inner">
        <div class="header-logo">
          <span class="header-icon">📚</span>
          <h1>My Library</h1>
        </div>
        <p class="header-count"><span id="book-count">0</span> books in collection</p>
      </div>
    </header>
 
    <!-- MAIN -->
    <main class="main">
 
      <!-- LEFT — FORM -->
      <aside class="form-aside">
        <div class="form-card">
          <div class="form-card-header">
            <h2>Add New Book</h2>
            <p>Fill in the details below</p>
          </div>
 
          <form action="#" id="book">
            <fieldset>
 
              <div class="field">
                <label for="book-title">Book Title</label>
                <input type="text" id="book-title" placeholder="e.g. The Great Gatsby" required/>
                <span class="field-hint">Required</span>
              </div>
 
              <div class="field">
                <label for="author-name">Author</label>
                <input type="text" id="author-name" placeholder="e.g. F. Scott Fitzgerald" required/>
                <span class="field-hint">Required</span>
              </div>
 
              <div class="field">
                <label for="number-of-pages">Number of Pages</label>
                <input type="number" id="number-of-pages" placeholder="e.g. 180" min="1" required/>
                <span class="field-hint">Required · Must be at least 1</span>
              </div>
 
              <div class="field">
                <label for="state">Reading Status</label>
                <div class="select-wrap">
                  <select id="state">
                    <option value="Not Read">📖 Not Read</option>
                    <option value="Reading">🔖 Reading</option>
                    <option value="Read">✅ Read</option>
                  </select>
                </div>
              </div>
 
              <button form="book" type="submit" id="submit-btn">
                <span>Add to Library</span>
                <span class="btn-icon">+</span>
              </button>
 
            </fieldset>
          </form>
        </div>
 
        <!-- STATS -->
        <div class="stats-card">
          <div class="stat">
            <span class="stat-num" id="stat-total">0</span>
            <span class="stat-label">Total</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat">
            <span class="stat-num read" id="stat-read">0</span>
            <span class="stat-label">Read</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat">
            <span class="stat-num unread" id="stat-unread">0</span>
            <span class="stat-label">Unread</span>
          </div>
        </div>
      </aside>
 
      <!-- RIGHT — BOOKS -->
      <section class="books-section">
        <div class="books-header">
          <h2>Your Collection</h2>
          <div class="filter-btns">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="Read">Read</button>
            <button class="filter-btn" data-filter="Not Read">Unread</button>
          </div>
        </div>
 
        <div id="books-container"></div>
      </section>
 
    </main>
 
    <script src="script.js"></script>
  </body>
</html>
