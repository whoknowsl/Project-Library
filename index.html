<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Library</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- HEADER -->
    <div class="header">
      <h1>Library</h1>
    </div>

    <!-- MAIN LAYOUT -->
    <main>

      <!-- FORM -->
      <form action="#" id="book">
        <fieldset>
          <legend>Add a Book</legend>

          <div class="field-wrap">
            <label for="book-title">Title</label>
            <input type="text" id="book-title" placeholder="Enter book title..." required/>

            <label for="author-name">Author</label>
            <input type="text" id="author-name" placeholder="Author name..." required/>

            <label for="number-of-pages">Pages</label>
            <input type="number" id="number-of-pages" placeholder="Number of pages..." min="1" required/>

            <label for="state">Reading State</label>
            <select id="state">
              <option value="Not Read">Not Read</option>
              <option value="Read">Read</option>
            </select>
          </div>

          <button form="book" type="submit" id="submit-btn">Add to Library</button>

        </fieldset>
      </form>

      <!-- BOOKS -->
      <div class="books-section">
        <h2>My Collection</h2>
        <div class="content" id="books-container"></div>
      </div>

    </main>

    <script src="script.js"></script>
  </body>
</html>
