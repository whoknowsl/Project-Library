<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="header">
      <h1>Library</h1>
    </div>
    <div class="add-book" id="addbook">
  <fieldset>
    <legend>Add Book</legend>

    <label for="book-title">Title:</label>
    <input type="text" id="book-title" required/>

    <label for="author-name">Author:</label>
    <input type="text" id="author-name" required/>

    <label for="number-of-pages">Pages:</label>
    <input type="number" id="number-of-pages" required/>

    <label for="state">State:</label>
    <select id="state">
      <option value="Not Read">Not Read</option>
      <option value="Reading">Reading</option>
      <option value="Read">Read</option>
    </select>

    <button id="add-btn">Add Book</button>
  </fieldset>
</div>
    <div class="content" id="books-container">
      
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
